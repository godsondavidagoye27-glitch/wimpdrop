<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Wimp-Drop</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="notification-container"></div>
    
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="../index.html" style="color: inherit; text-decoration: none;">Wimp<span>-Drop</span></a>
            </div>
            <nav style="display: none;"></nav>
            <div class="header-actions"><div data-auth-section></div></div>
        </div>
    </header>
    
    <section class="section" style="min-height: 60vh; display: flex; align-items: center;">
        <div class="container" style="max-width: 400px;">
            <div style="background: #f5f5f5; padding: 2rem; border-radius: 12px;">
                <h1 style="text-align: center; margin-bottom: 2rem;">Create Account</h1>
                
                <form id="register-form" onsubmit="handleRegisterForm(event)">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" name="firstName" placeholder="John" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" name="lastName" placeholder="Doe" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="john@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" name="confirmPassword" placeholder="••••••••" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" name="phone" placeholder="+1 (555) 000-0000">
                    </div>
                    
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <label style="font-weight: normal; display: flex; gap: 0.5rem;">
                            <input type="checkbox" name="terms" required>
                            <span>I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a></span>
                        </label>
                        <label style="font-weight: normal; display: flex; gap: 0.5rem;">
                            <input type="checkbox" name="newsletter">
                            <span>Subscribe to our newsletter for exclusive deals</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block btn-large">Create Account</button>
                </form>
                
               
                
                <p style="text-align: center; margin-top: 1.5rem;">
                    Already have an account?
                    <a href="login.html" style="font-weight: 600;">Sign in here</a>
                </p>
            </div>
        </div>
    </section>
    
    <footer style="margin-top: auto;">
        <div class="footer-content">
            <div class="footer-section">
                <h4>About Wimp-Drop</h4>
                <p>Your trusted global marketplace.</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Legal</h4>
                <ul>
                    <li><a href="privacy.html">Privacy Policy</a></li>
                    <li><a href="terms.html">Terms</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Wimp-Drop. All rights reserved.</p>
        </div>
    </footer>
    <script>
        async function handleRegisterForm(event) {
            event.preventDefault();
            await window._supabaseReady;
            
            const email = document.querySelector('input[name="email"]').value.trim();
            const password = document.querySelector('input[name="password"]').value;
            const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;
            const firstName = document.querySelector('input[name="firstName"]').value.trim();
            const lastName = document.querySelector('input[name="lastName"]').value.trim();
            const btn = document.querySelector('button[type="submit"]');

            if (password !== confirmPassword) {
                showNotification('Passwords do not match', 'error');
                return;
            }

            btn.textContent = 'Creating account...';
            btn.disabled = true;

            try {
                const { data, error } = await window._supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { full_name: `${firstName} ${lastName}` }
                    }
                });

                if (error) throw error;

                showNotification('Account created! Check your email to verify.', 'success');
                setTimeout(() => window.location.href = 'login.html', 2000);

            } catch (error) {
                showNotification(error.message || 'Registration failed', 'error');
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        }
    </script>
    <script src="../js/env.js"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/flutterwave.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
