<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wimp-Drop</title>
    <link rel="stylesheet" href="../css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="notification-container"></div>
    
    <header>
        <div class="header-container">
            <div class="logo">
                <a href="../index.html" style="color: inherit; text-decoration: none;">Wimp<span>-Drop</span></a>
            </div>
            <nav style="display: none;"></nav>
            <div class="header-actions"><div data-auth-section></div></div>
        </div>
    </header>
    
    <section class="section" style="min-height: 60vh; display: flex; align-items: center;">
        <div class="container" style="max-width: 400px;">
            <div style="background: #f5f5f5; padding: 2rem; border-radius: 12px;">
                <h1 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h1>
                
                <form id="login-form" onsubmit="handleLoginForm(event)">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="john@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" placeholder="••••••••" required>
                    </div>
                    
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; margin: 0;">
                            <input type="checkbox" name="remember">
                            Remember me
                        </label>
                        <a href="#" style="font-size: 0.875rem;">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block btn-large">Sign In</button>
                </form>
                
                <div style="text-align: center; margin: 1.5rem 0; color: #999;">
                    Or continue with
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <button type="button" class="btn btn-secondary btn-block" onclick="handleOAuthLogin('google')">
                        <span style="font-size: 1.25rem;">G</span> Google
                    </button>
                    <button type="button" class="btn btn-secondary btn-block" onclick="handleOAuthLogin('facebook')">
                        <span style="font-size: 1.25rem;">f</span> Facebook
                    </button>
                </div>
                
                <p style="text-align: center; margin-top: 1.5rem;">
                    Don't have an account?
                    <a href="register.html" style="font-weight: 600;">Sign up here</a>
                </p>
            </div>
        </div>
    </section>
    
    <footer style="margin-top: auto;">
        <div class="footer-content">
            <div class="footer-section">
                <h4>About Wimp-Drop</h4>
                <p>Your trusted global marketplace.</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Legal</h4>
                <ul>
                    <li><a href="privacy.html">Privacy Policy</a></li>
                    <li><a href="terms.html">Terms</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 Wimp-Drop. All rights reserved.</p>
        </div>
    </footer>
    
    <script>
        async function handleLoginForm(event) {
            event.preventDefault();
            
            const email = document.querySelector('input[name="email"]').value.trim();
            const password = document.querySelector('input[name="password"]').value;
            const btn = document.querySelector('button[type="submit"]');

            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                const { data, error } = await window._supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                showNotification('Welcome back!', 'success');
                setTimeout(() => window.location.href = 'account.html', 800);
            } catch (error) {
                const msg = error.message?.includes('Invalid login credentials')
                    ? 'Wrong email or password. Try again.'
                    : error.message || 'Login failed';
                showNotification(msg, 'error');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        }
    </script>
    <script src="../js/main.js"></script>
</body>
</html>
